<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Store</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HERO -->
   <!-- HERO CON SLIDER -->
<header class="hero-slider">

    <!-- SLIDES -->
    <div class="slide fade1">
        <img src="img/logo.jpeg" alt="Slide 1">
    </div>

    <div class="slide fade2">
        <img src="img/imagen1.jpeg" alt="Slide 2">
    </div>

    <div class="slide fade3">
        <img src="img/imagen2.jpeg" alt="Slide 3">
    </div>

    <!-- TEXTO ENCIMA -->
    <div class="hero-content">
        <h1>Arizu Store</h1>
        <p>Productos de belleza premium para resaltar tu mejor versión</p>
        <button class="btn btn-primary">Ver Productos</button>
        <button class="btn btn-secondary">Ofertas</button>
    </div>

</header>


    <!-- PRODUCTOS -->
    <section class="productos">
        <h2>Productos Destacados</h2>

        <div class="products">

            <div class="product-card">
                <img src="img/imagen1.jpeg" alt="Serum Facial">
                <h3>Serum Facial</h3>
                <p class="price">$399 MXN</p>
                <button class="buy-btn">Comprar</button>
            </div>

            <div class="product-card">
                <img src="img/imagen2.jpeg" alt="Crema Hidratante">
                <h3>Crema Hidratante</h3>
                <p class="price">$299 MXN</p>
                <button class="buy-btn">Comprar</button>
            </div>

            <div class="product-card">
                <img src="img/imagen3.jpeg" alt="Labial Mate">
                <h3>Labial Mate</h3>
                <p class="price">$199 MXN</p>
                <button class="buy-btn">Comprar</button>
            </div>

        </div>
    </section>

    <!-- CONTACTO -->
    <section class="contact">
        <h2>Contacto</h2>
        <a href="mailto:contacto@beautystore.com">📧 contacto@arizu.com</a>
        <a href="tel:+521234567890">📞 +52 123 456 7890</a>
        <a href="https://wa.me/521234567890">💬 WhatsApp</a>
    </section>

    <footer>
        © 2026 Arizu Store — Todos los derechos reservados
    </footer>

</body>
</html>
