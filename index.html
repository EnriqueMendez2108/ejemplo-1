<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spa Natura</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HEADER -->
    <header class="spa-header">
        <h1>Spa Natura</h1>
        <p>Belleza natural para tu bienestar</p>
        <button class="spa-btn">Descubrir Productos</button>
    </header>

    <!-- PRODUCTOS -->
    <section class="spa-products">
        <h2>Productos Naturales</h2>

        <div class="spa-grid">

            <div class="spa-card">
                <img src="img/spa1.jpg" alt="Crema Natural">
                <h3>Crema Herbal</h3>
                <p class="spa-price">$320 MXN</p>
                <button class="spa-buy">Comprar</button>
            </div>

            <div class="spa-card">
                <img src="img/spa2.jpg" alt="Aceite Natural">
                <h3>Aceite de Lavanda</h3>
                <p class="spa-price">$260 MXN</p>
                <button class="spa-buy">Comprar</button>
            </div>

            <div class="spa-card">
                <img src="img/spa3.jpg" alt="Mascarilla Natural">
                <h3>Mascarilla de Aloe</h3>
                <p class="spa-price">$210 MXN</p>
                <button class="spa-buy">Comprar</button>
            </div>

        </div>
    </section>

    <!-- CONTACTO -->
    <section class="spa-contact">
        <h2>Contacto</h2>
        <a href="mailto:info@spanatura.com">📧 info@spanatura.com</a>
        <a href="tel:+521234567890">📞 +52 123 456 7890</a>
        <a href="https://wa.me/521234567890">💬 WhatsApp</a>
    </section>

    <footer class="spa-footer">
        © 2026 Spa Natura — Todos los derechos reservados
    </footer>

</body>
</html>
